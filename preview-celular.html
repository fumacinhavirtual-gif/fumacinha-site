<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prévia celular | Fumacinha</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 14px;
        background: #f2f3f1;
        color: #111;
        font-family: Arial, Helvetica, sans-serif;
      }

      .wrap {
        width: min(100%, 430px);
      }

      .label {
        margin: 0 0 14px;
        color: #2d7d46;
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
      }

      .phone {
        width: min(100%, 390px);
        height: min(82vh, 844px);
        margin: 0 auto;
        padding: 12px;
        border: 8px solid #111;
        border-radius: 38px;
        background: #111;
        box-shadow: 0 28px 80px rgba(17, 17, 17, 0.24);
      }

      .screen {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 26px;
        background: #fff;
      }

      .hint {
        margin: 14px auto 0;
        max-width: 360px;
        color: #666;
        font-size: 0.9rem;
        line-height: 1.45;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="label">Prévia no celular</p>
      <div class="phone">
        <iframe class="screen" src="./index.html" title="Site Fumacinha em tamanho de celular"></iframe>
      </div>
      <p class="hint">Essa moldura simula um celular de 390px de largura. Você pode rolar dentro da tela para ver o site inteiro.</p>
    </main>
  </body>
</html>
